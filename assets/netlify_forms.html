<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Netlify Form Detection</title>
</head>

<body>
    <form name="contact" data-netlify="true" style="display:none">
        <input type="text" name="name">
        <input type="text" name="subject">
        <input type="email" name="email">
        <textarea name="message"></textarea>
    </form>
</body>

</html>
